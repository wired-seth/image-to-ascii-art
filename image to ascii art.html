<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Gerador imagens em ascii</title>
  <style>
    body{font-family: Inter, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial; margin:18px; background:#0f1115; color:#e6eef8}
    h1{font-size:18px;margin:0 0 10px}
    .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
    .panel{background:#0b0c0f;border:1px solid #222;padding:12px;border-radius:8px}
    #controls{max-width:980px;margin-bottom:12px}
    input[type=file]{display:block}
    pre#ascii{white-space:pre; line-height:7px; font-family: monospace; font-size:7px; overflow:auto; background:#000; padding:10px; border-radius:6px}
    .small{font-size:12px;color:#9fb0c8}
    label{display:inline-flex;gap:8px;align-items:center}
    button{background:#0f6396;border:0;color:white;padding:8px 10px;border-radius:6px;cursor:pointer}
    button.secondary{background:#2f3a44}
    input[type=range]{width:180px}
    .preview{max-width:300px; max-height:360px; border-radius:6px}
    footer{margin-top:12px;color:#7f98b0;font-size:13px}
    a.link{color:#7ad; text-decoration:none}
  </style>
</head>
<body>
  <h1>imagem em ascii bleee</h1>
  <div id="controls" class="panel">
    <div class="row">
      <div>
        <input id="file" type="file" accept="image/*">
        <div class="small">Ou arraste uma imagem para a caixa abaixo.</div>
      </div>
      <div style="display:flex;flex-direction:column;gap:6px">
        <label class="small">Largura em caracteres: <strong id="wVal">120</strong>
          <input id="widthRange" type="range" min="40" max="240" value="120">
        </label>
        <label class="small">Altura do caractere (proporção): <strong id="ratioVal">0.55</strong>
          <input id="ratioRange" type="range" min="0.3" max="1.0" step="0.01" value="0.55">
        </label>
        <label class="small">FPS simulado (apenas para visualizar):
          <input id="fpsInput" type="number" value="5" min="1" max="30" style="width:70px">
        </label>
      </div>
      <div style="margin-left:auto;display:flex;flex-direction:column;gap:8px;align-items:flex-end">
        <button id="downloadTxt">⤓ Baixar .txt</button>
        <button id="downloadPng" class="secondary">⤓ Baixar imagem ASCII</button>
      </div>
    </div>
  </div>

  <div style="display:flex;gap:12px;align-items:flex-start;max-width:1200px">
    <div style="flex:1">
      <div id="dropzone" class="panel" style="min-height:220px;display:flex;align-items:center;justify-content:center;flex-direction:column;">
        <div class="small">Arraste, selecione ou cole a imagem(Ctrl+V).</div>
        <canvas id="hiddenCanvas" style="display:none"></canvas>
        <pre id="ascii">Nenhuma imagem carregada.</pre>
      </div>
    </div>
    <div style="width:320px">
      <div class="panel">
        <div class="small">Preview (original):</div>
        <img id="previewImg" class="preview" src="" alt="preview">
        <div style="height:12px"></div>
        <div class="small">Charset:</div>
        <select id="charset" style="width:100%">
          <option value="$@B%8&WM#*oahkbdpqwmZO0QLCJUYXzcvunxrjft/|()1{}[]?-_+~<>i!lI;:,^`'.">Complexo (padrão)</option>
          <option value="@%#*+=-:. ">Simples</option>
          <option value=" .:-=+*#%@">Invertido</option>
        </select>
        <div style="height:8px"></div>
        <label class="small"><input id="colorToggle" type="checkbox" checked> Manter cores (RGB)</label>
        <label class="small"><input id="antialias" type="checkbox"> Usar textura fina (atenuação da altura)</label>
      </div>
    </div>
  </div>

  <footer>seth — arraste/cole a foto e ajuste largura. <span class="small">→ Pressione Ctrl+V para colar imagem da área de transferência</span></footer>

  <script>
    // Elementos
    const fileInput = document.getElementById('file');
    const asciiEl = document.getElementById('ascii');
    const hiddenCanvas = document.getElementById('hiddenCanvas');
    const previewImg = document.getElementById('previewImg');
    const widthRange = document.getElementById('widthRange');
    const ratioRange = document.getElementById('ratioRange');
    const wVal = document.getElementById('wVal');
    const ratioVal = document.getElementById('ratioVal');
    const charsetSel = document.getElementById('charset');
    const colorToggle = document.getElementById('colorToggle');
    const downloadTxt = document.getElementById('downloadTxt');
    const downloadPng = document.getElementById('downloadPng');
    const dropzone = document.getElementById('dropzone');

    let currentImage = null;

    widthRange.oninput = () => { wVal.textContent = widthRange.value; render(); };
    ratioRange.oninput = () => { ratioVal.textContent = ratioRange.value; render(); };
    charsetSel.onchange = render;
    colorToggle.onchange = render;
    fileInput.onchange = e => { loadFile(e.target.files[0]); };


    dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.style.border = '1px dashed #4aa'; });
    dropzone.addEventListener('dragleave', e => { dropzone.style.border = ''; });
    dropzone.addEventListener('drop', e => {
      e.preventDefault(); dropzone.style.border = '';
      const f = e.dataTransfer.files && e.dataTransfer.files[0];
      if (f) loadFile(f);
    });

    window.addEventListener('paste', (e) => {
      const items = e.clipboardData && e.clipboardData.items;
      if (!items) return;
      for (let i=0;i<items.length;i++){
        const it = items[i];
        if (it.type.indexOf('image')!==-1){
          const file = it.getAsFile();
          loadFile(file);
          break;
        }
      }
    });

    function loadFile(file){
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        const img = new Image();
        img.onload = () => { currentImage = img; previewImg.src = img.src; render(); };
        img.src = ev.target.result;
      };
      reader.readAsDataURL(file);
    }

    function render(){
      if (!currentImage) { asciiEl.textContent = 'Nenhuma imagem carregada.'; return; }
      const widthChars = parseInt(widthRange.value,10);
      const charRatio = parseFloat(ratioRange.value);
      const charset = charsetSel.value;
      const useColor = colorToggle.checked;

      const imgW = currentImage.naturalWidth;
      const imgH = currentImage.naturalHeight;
      const aspect = imgH / imgW;
      const newH = Math.max(2, Math.round(widthChars * aspect * charRatio));

      hiddenCanvas.width = widthChars;
      hiddenCanvas.height = newH;
      const ctx = hiddenCanvas.getContext('2d');
      ctx.drawImage(currentImage, 0, 0, widthChars, newH);
      const imageData = ctx.getImageData(0,0,widthChars,newH).data;

      const chars = [];
      const len = charset.length;

      for (let y=0;y<newH;y++){
        let row = '';
        for (let x=0;x<widthChars;x++){
          const i = (y*widthChars + x)*4;
          const r = imageData[i];
          const g = imageData[i+1];
          const b = imageData[i+2];
          const lum = Math.round(0.299*r + 0.587*g + 0.114*b);
          const idx = Math.floor((lum/255) * (len-1));
          const ch = charset[idx] || ' ';
          if (useColor){
            row += `<span style="color:rgb(${r},${g},${b});">${ch}</span>`;
          } else {
            row += ch;
          }
        }
        chars.push(row);
      }

      asciiEl.innerHTML = chars.join('\n');
    }

    downloadTxt.addEventListener('click', ()=>{
      if (!currentImage) return alert('Carregue uma imagem primeiro.');
      const tmp = document.createElement('div'); tmp.innerHTML = asciiEl.innerHTML;
      const plain = tmp.textContent || tmp.innerText || '';
      const blob = new Blob([plain], {type:'text/plain;charset=utf-8'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href = url; a.download = 'ascii.txt'; a.click(); URL.revokeObjectURL(url);
    });


    downloadPng.addEventListener('click', ()=>{
      if (!currentImage) return alert('Carregue uma imagem primeiro.');
 
      const fontSize = 8; 
      const widthChars = parseInt(widthRange.value,10);
      const charRatio = parseFloat(ratioRange.value);
      const imgW = currentImage.naturalWidth;
      const imgH = currentImage.naturalHeight;
      const aspect = imgH / imgW;
      const newH = Math.max(2, Math.round(widthChars * aspect * charRatio));

      const outCanvas = document.createElement('canvas');
      const ctx = outCanvas.getContext('2d');
      const outW = widthChars * fontSize;
      const outH = newH * (fontSize+1);
      outCanvas.width = outW;
      outCanvas.height = outH;
      ctx.fillStyle = 'black'; ctx.fillRect(0,0,outW,outH);
      ctx.font = fontSize+'px monospace';
      ctx.textBaseline = 'top';


      const lines = asciiEl.querySelectorAll('span') ? null : null;
      const tmp = document.createElement('div'); tmp.innerHTML = asciiEl.innerHTML;
      const textLines = tmp.textContent.split('\n');

     
      const hidden = hiddenCanvas; const hctx = hidden.getContext('2d');
      const data = hctx.getImageData(0,0,widthChars,newH).data;

      for (let y=0;y<newH;y++){
        for (let x=0;x<widthChars;x++){
          const i = (y*widthChars + x)*4;
          const r = data[i], g = data[i+1], b = data[i+2];
          ctx.fillStyle = `rgb(${r},${g},${b})`;
          const ch = textLines[y] ? textLines[y][x] || ' ' : ' ';
          ctx.fillText(ch, x*fontSize, y*(fontSize+1));
        }
      }

      outCanvas.toBlob(blob=>{ const url = URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download='ascii.png'; a.click(); URL.revokeObjectURL(url); });
    });


    previewImg.addEventListener('load', ()=>{ if (!currentImage) { currentImage = previewImg; } render(); });
  </script>
</body>
</html>
